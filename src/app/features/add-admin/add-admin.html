<app-navbar></app-navbar>
<div class="add-admin-card">


  <form #adminForm="ngForm" (ngSubmit)="onSubmit(adminForm.value, adminForm)" novalidate>
    <h2>Add Admin</h2>
    <label for="name">Initials and Surname</label>
    <input type="text" id="name" name="name" [(ngModel)]="name" placeholder="Enter initials and surname" required />
    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      [(ngModel)]="email"
      placeholder="Enter admin email"
      required />


    <label for="idNumber">ID Number</label>
    <input type="text" id="idNumber" name="idNumber" [(ngModel)]="idNumber" placeholder="Enter ID Number" required />

    <label for="regNumber">Registration Number</label>
    <input type="text" id="regNumber" name="regNumber" [(ngModel)]="regNumber" placeholder="Enter registration number" required />

    <label for="password">Create Password</label>
    <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Create password" required />

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirm password" required />

    <label for="role">Role</label>
    <select id="role" name="role" [(ngModel)]="role" required>
      <option value="">-- Select Role --</option>
      <option value="security">Admin</option>
      <option value="security">Security</option>
      <option value="security">Officials</option>
    </select>

    <button type="submit">REGISTER ADMIN</button>
  </form>
</div>
