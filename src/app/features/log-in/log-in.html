
<form (ngSubmit)="onSubmit()" #signinForm="ngForm" novalidate>
  <h2>Sign In</h2>
  <label for="idNumber">ID Number</label>
  <input
    type="text"
    id="idNumber"
    name="idNumber"
    [(ngModel)]="idNumber"
    placeholder="Enter your ID Number"
    required
    #idNumberCtrl="ngModel" />

  <div *ngIf="idNumberCtrl.invalid && idNumberCtrl.touched" class="error">
    ID Number is required.
  </div>

  <label for="password">Password</label>
  <input
    type="password"
    id="password"
    name="password"
    [(ngModel)]="password"
    placeholder="Enter your password"
    required
    #passwordCtrl="ngModel" />

  <div *ngIf="passwordCtrl.invalid && passwordCtrl.touched" class="error">
    Password is required (minimum 8 characters).
  </div>

  <button type="submit" [disabled]="signinForm.invalid">SIGN IN</button>

  <div class="links">
    <a href="/register">Register new account! Sign Up</a>
    <a href="/forgot-password">Forgot Password?</a>
  </div>
</form>
